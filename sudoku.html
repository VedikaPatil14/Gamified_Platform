<!-- soduku html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku - NEXUS GAMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-pink: #ff006e;
            --cyber-blue: #00f5ff;
            --cyber-purple: #8338ec;
            --cyber-green: #06ffa5;
            --dark-bg: #050714;
            --card-bg: #16213e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #0a0e27, #050714);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .game-header {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(0, 245, 255, 0.3);
        }

        .back-btn {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid var(--cyber-blue);
            border-radius: 8px;
            color: var(--cyber-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--cyber-blue);
            color: #000;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--cyber-blue);
            text-transform: uppercase;
        }

        .game-card {
            background: var(--card-bg);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .timer {
            font-size: 1.5rem;
            color: var(--cyber-yellow);
        }

        .difficulty-select {
            padding: 8px 15px;
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid var(--cyber-blue);
            border-radius: 8px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            cursor: pointer;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 0;
            background: var(--cyber-blue);
            padding: 2px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .sudoku-cell {
            aspect-ratio: 1;
            background: var(--darker-bg);
            border: 1px solid rgba(0, 245, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sudoku-cell:hover:not(.prefilled) {
            background: rgba(0, 245, 255, 0.1);
        }

        .sudoku-cell.prefilled {
            color: var(--cyber-blue);
            cursor: default;
        }

        .sudoku-cell.selected {
            background: rgba(0, 245, 255, 0.2);
            box-shadow: inset 0 0 10px rgba(0, 245, 255, 0.5);
        }

        .sudoku-cell.error {
            background: rgba(255, 0, 110, 0.2);
            color: var(--cyber-pink);
        }

        .sudoku-cell.correct {
            color: var(--cyber-green);
        }

        .number-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .number-btn {
            padding: 15px;
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .number-btn:hover {
            background: rgba(0, 245, 255, 0.2);
            transform: translateY(-2px);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .action-btn {
            padding: 12px;
            background: linear-gradient(135deg, var(--cyber-blue), var(--cyber-purple));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.5);
        }

        .action-btn.secondary {
            background: transparent;
            border: 2px solid var(--cyber-blue);
        }

        .win-message {
            display: none;
            text-align: center;
            padding: 30px;
            background: rgba(6, 255, 165, 0.1);
            border: 2px solid var(--cyber-green);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .win-message.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .win-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--cyber-green);
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .game-header {
                flex-direction: column;
                gap: 15px;
            }

            .sudoku-cell {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <a href="subject.html?subject=Maths" class="back-btn">← Back</a>
            <h1 class="game-title">🔢 Sudoku</h1>
        </div>

        <div class="game-card">
            <div class="controls">
                <div class="timer" id="timer">Time: 00:00</div>
                <select class="difficulty-select" id="difficulty" onchange="newGame()">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>

            <div class="win-message" id="winMessage">
                <div class="win-title">🏆 Congratulations!</div>
                <p>You completed the puzzle!</p>
            </div>

            <div class="sudoku-grid" id="sudokuGrid"></div>

            <div class="number-pad">
                <button class="number-btn" onclick="selectNumber(1)">1</button>
                <button class="number-btn" onclick="selectNumber(2)">2</button>
                <button class="number-btn" onclick="selectNumber(3)">3</button>
                <button class="number-btn" onclick="selectNumber(4)">4</button>
                <button class="number-btn" onclick="selectNumber(5)">5</button>
                <button class="number-btn" onclick="selectNumber(6)">6</button>
                <button class="number-btn" onclick="selectNumber(7)">7</button>
                <button class="number-btn" onclick="selectNumber(8)">8</button>
                <button class="number-btn" onclick="selectNumber(9)">9</button>
                <button class="number-btn" onclick="selectNumber(0)">✖</button>
            </div>

            <div class="action-buttons">
                <button class="action-btn" onclick="checkSolution()">Check</button>
                <button class="action-btn secondary" onclick="newGame()">New Game</button>
            </div>
        </div>
    </div>

    <script>
        let grid = [];
        let solution = [];
        let selectedCell = null;
        let startTime = Date.now();
        let timerInterval;

        function generateSudoku() {
            // Create a simple valid sudoku
            grid = [
                [5,3,0,0,7,0,0,0,0],
                [6,0,0,1,9,5,0,0,0],
                [0,9,8,0,0,0,0,6,0],
                [8,0,0,0,6,0,0,0,3],
                [4,0,0,8,0,3,0,0,1],
                [7,0,0,0,2,0,0,0,6],
                [0,6,0,0,0,0,2,8,0],
                [0,0,0,4,1,9,0,0,5],
                [0,0,0,0,8,0,0,7,9]
            ];

            solution = [
                [5,3,4,6,7,8,9,1,2],
                [6,7,2,1,9,5,3,4,8],
                [1,9,8,3,4,2,5,6,7],
                [8,5,9,7,6,1,4,2,3],
                [4,2,6,8,5,3,7,9,1],
                [7,1,3,9,2,4,8,5,6],
                [9,6,1,5,3,7,2,8,4],
                [2,8,7,4,1,9,6,3,5],
                [3,4,5,2,8,6,1,7,9]
            ];

            const difficulty = document.getElementById('difficulty').value;
            let cellsToRemove = difficulty === 'easy' ? 30 : difficulty === 'medium' ? 40 : 50;
            
            // Simple difficulty adjustment
            if(difficulty === 'hard') {
                for(let i = 0; i < 9; i++) {
                    for(let j = 0; j < 9; j++) {
                        if(Math.random() > 0.4) grid[i][j] = 0;
                    }
                }
            }
        }

        function renderGrid() {
            const gridElement = document.getElementById('sudokuGrid');
            gridElement.innerHTML = '';

            for(let i = 0; i < 9; i++) {
                for(let j = 0; j < 9; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'sudoku-cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;

                    if(grid[i][j] !== 0) {
                        cell.textContent = grid[i][j];
                        cell.classList.add('prefilled');
                    }

                    cell.onclick = () => selectCell(cell, i, j);
                    gridElement.appendChild(cell);
                }
            }
        }

        function selectCell(element, row, col) {
            if(grid[row][col] !== 0) return; // Don't select prefilled cells

            document.querySelectorAll('.sudoku-cell').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            selectedCell = { row, col, element };
        }

        function selectNumber(num) {
            if(!selectedCell) return;

            const { row, col, element } = selectedCell;
            
            if(num === 0) {
                grid[row][col] = 0;
                element.textContent = '';
                element.classList.remove('error', 'correct');
            } else {
                grid[row][col] = num;
                element.textContent = num;
                
                if(num === solution[row][col]) {
                    element.classList.add('correct');
                    element.classList.remove('error');
                } else {
                    element.classList.add('error');
                    element.classList.remove('correct');
                }
            }
        }

        function checkSolution() {
            let correct = true;
            for(let i = 0; i < 9; i++) {
                for(let j = 0; j < 9; j++) {
                    if(grid[i][j] !== solution[i][j]) {
                        correct = false;
                        break;
                    }
                }
            }

            if(correct) {
                document.getElementById('winMessage').classList.add('active');
                clearInterval(timerInterval);
                saveToHistory('Sudoku', 'Medium', 100, 100);
            } else {
                alert('Not quite right! Keep trying! 🎯');
            }
        }

        function newGame() {
            document.getElementById('winMessage').classList.remove('active');
            generateSudoku();
            renderGrid();
            selectedCell = null;
            startTime = Date.now();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('timer').textContent = 
                    `Time: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function saveToHistory(gameName, difficulty, score, total) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) return;

            const progressKey = `progress_${currentUser.email}`;
            let progressData = JSON.parse(localStorage.getItem(progressKey)) || {
                gamesPlayed: 0,
                streak: 0,
                longestStreak: 0,
                lastDate: null,
                activeDates: [],
                xp: 0,
                subjects: { Maths: 0, Physics: 0, Chemistry: 0 },
                history: []
            };

            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            progressData.history.push({
                problem: gameName,
                subject: 'Maths',
                difficulty: difficulty,
                date: dateStr,
                timestamp: today.getTime()
            });

            progressData.gamesPlayed += 1;
            progressData.xp += 50;
            
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            if (progressData.lastDate === yesterday) {
                progressData.streak += 1;
            } else if (progressData.lastDate !== today.toDateString()) {
                progressData.streak = 1;
            }
            
            if (progressData.streak > progressData.longestStreak) {
                progressData.longestStreak = progressData.streak;
            }
            
            progressData.lastDate = today.toDateString();
            
            if (!progressData.activeDates.includes(today.toDateString())) {
                progressData.activeDates.push(today.toDateString());
            }

            localStorage.setItem(progressKey, JSON.stringify(progressData));
        }

        newGame();
    </script>
</body>
</html>
