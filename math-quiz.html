<!-- maths quiz html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz - NEXUS GAMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-pink: #ff006e;
            --cyber-blue: #00f5ff;
            --cyber-purple: #8338ec;
            --cyber-green: #06ffa5;
            --dark-bg: #050714;
            --card-bg: #16213e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #0a0e27, #050714);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .game-header {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(0, 245, 255, 0.3);
        }

        .back-btn {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid var(--cyber-blue);
            border-radius: 8px;
            color: var(--cyber-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--cyber-blue);
            color: #000;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--cyber-blue);
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            color: var(--cyber-green);
            font-weight: bold;
        }

        .game-card {
            background: var(--card-bg);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
        }

        .question {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 40px;
            color: var(--cyber-blue);
            font-family: 'Orbitron', sans-serif;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .answer-btn {
            padding: 30px;
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .answer-btn:hover {
            background: rgba(0, 245, 255, 0.2);
            border-color: var(--cyber-blue);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.4);
        }

        .answer-btn.correct {
            background: rgba(6, 255, 165, 0.2);
            border-color: var(--cyber-green);
            animation: pulse-green 0.5s ease;
        }

        .answer-btn.wrong {
            background: rgba(255, 0, 110, 0.2);
            border-color: var(--cyber-pink);
            animation: shake 0.5s ease;
        }

        @keyframes pulse-green {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .timer {
            font-size: 1.5rem;
            color: var(--cyber-yellow);
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-purple));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--cyber-blue);
        }

        .result-screen {
            display: none;
        }

        .result-screen.active {
            display: block;
        }

        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-score {
            font-size: 4rem;
            font-weight: bold;
            color: var(--cyber-green);
            margin-bottom: 30px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .result-stat {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 245, 255, 0.2);
        }

        .result-stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--cyber-blue);
        }

        .result-stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .action-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--cyber-blue), var(--cyber-purple));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.5);
        }

        .action-btn.secondary {
            background: transparent;
            border: 2px solid var(--cyber-blue);
        }

        @media (max-width: 768px) {
            .answers-grid {
                grid-template-columns: 1fr;
            }

            .game-header {
                flex-direction: column;
                gap: 15px;
            }

            .result-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <a href="subject.html?subject=Maths" class="back-btn">← Back</a>
            <h1 class="game-title">🧮 Math Quiz</h1>
            <div class="stats">
                <div class="stat">
                    <span>Score:</span>
                    <span class="stat-value" id="scoreDisplay">0</span>
                </div>
                <div class="stat">
                    <span>Question:</span>
                    <span class="stat-value" id="questionNum">1/10</span>
                </div>
            </div>
        </div>

        <div class="game-card">
            <div id="gameScreen">
                <div class="timer" id="timer">Time: 30s</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 10%"></div>
                </div>
                <div class="question" id="question">5 + 3 = ?</div>
                <div class="answers-grid" id="answers"></div>
            </div>

            <div class="result-screen" id="resultScreen">
                <div class="result-title">🏆 Quiz Complete!</div>
                <div class="result-score" id="finalScore">8/10</div>
                <div class="result-stats">
                    <div class="result-stat">
                        <div class="result-stat-value" id="correctCount">8</div>
                        <div class="result-stat-label">Correct</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-value" id="wrongCount">2</div>
                        <div class="result-stat-label">Wrong</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-value" id="accuracy">80%</div>
                        <div class="result-stat-label">Accuracy</div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="action-btn" onclick="restartGame()">Play Again</button>
                    <button class="action-btn secondary" onclick="window.location.href='subject.html?subject=Maths'">Back to Games</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = 10;
        let timeLeft = 30;
        let timerInterval;
        let questions = [];

        function generateQuestion() {
            const operations = ['+', '-', '×', '÷'];
            const op = operations[Math.floor(Math.random() * operations.length)];
            let num1, num2, answer;

            switch(op) {
                case '+':
                    num1 = Math.floor(Math.random() * 50) + 1;
                    num2 = Math.floor(Math.random() * 50) + 1;
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * 50) + 20;
                    num2 = Math.floor(Math.random() * num1);
                    answer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * 12) + 1;
                    num2 = Math.floor(Math.random() * 12) + 1;
                    answer = num1 * num2;
                    break;
                case '÷':
                    num2 = Math.floor(Math.random() * 10) + 2;
                    answer = Math.floor(Math.random() * 10) + 1;
                    num1 = num2 * answer;
                    break;
            }

            const wrongAnswers = [];
            while(wrongAnswers.length < 3) {
                const wrong = answer + (Math.floor(Math.random() * 10) - 5);
                if(wrong !== answer && !wrongAnswers.includes(wrong) && wrong > 0) {
                    wrongAnswers.push(wrong);
                }
            }

            const allAnswers = [answer, ...wrongAnswers].sort(() => Math.random() - 0.5);

            return {
                question: `${num1} ${op} ${num2} = ?`,
                answer: answer,
                options: allAnswers
            };
        }

        function initGame() {
            questions = [];
            for(let i = 0; i < totalQuestions; i++) {
                questions.push(generateQuestion());
            }
            currentQuestion = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            if(currentQuestion >= totalQuestions) {
                showResults();
                return;
            }

            const q = questions[currentQuestion];
            document.getElementById('question').textContent = q.question;
            document.getElementById('questionNum').textContent = `${currentQuestion + 1}/${totalQuestions}`;
            document.getElementById('scoreDisplay').textContent = score;
            
            const progress = ((currentQuestion + 1) / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            const answersContainer = document.getElementById('answers');
            answersContainer.innerHTML = '';

            q.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option, btn);
                answersContainer.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            timeLeft = 30;
            clearInterval(timerInterval);
            updateTimer();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    nextQuestion();
                }
            }, 1000);
        }

        function updateTimer() {
            document.getElementById('timer').textContent = `Time: ${timeLeft}s`;
        }

        function checkAnswer(selected, btn) {
            clearInterval(timerInterval);
            const correct = questions[currentQuestion].answer;
            
            if(selected === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                // Highlight correct answer
                document.querySelectorAll('.answer-btn').forEach(b => {
                    if(parseInt(b.textContent) === correct) {
                        b.classList.add('correct');
                    }
                });
            }

            // Disable all buttons
            document.querySelectorAll('.answer-btn').forEach(b => {
                b.disabled = true;
                b.style.cursor = 'not-allowed';
            });

            setTimeout(nextQuestion, 1500);
        }

        function nextQuestion() {
            currentQuestion++;
            loadQuestion();
        }

        function showResults() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').classList.add('active');
            
            const accuracy = Math.round((score / totalQuestions) * 100);
            document.getElementById('finalScore').textContent = `${score}/${totalQuestions}`;
            document.getElementById('correctCount').textContent = score;
            document.getElementById('wrongCount').textContent = totalQuestions - score;
            document.getElementById('accuracy').textContent = accuracy + '%';

            // Save to history
            saveToHistory('Math Quiz', 'Easy', score, totalQuestions);
        }

        function restartGame() {
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('resultScreen').classList.remove('active');
            initGame();
        }

        function saveToHistory(gameName, difficulty, score, total) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) return;

            const progressKey = `progress_${currentUser.email}`;
            let progressData = JSON.parse(localStorage.getItem(progressKey)) || {
                gamesPlayed: 0,
                streak: 0,
                longestStreak: 0,
                lastDate: null,
                activeDates: [],
                xp: 0,
                subjects: { Maths: 0, Physics: 0, Chemistry: 0 },
                history: []
            };

            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            progressData.history.push({
                problem: `${gameName} (${score}/${total})`,
                subject: 'Maths',
                difficulty: difficulty,
                date: dateStr,
                timestamp: today.getTime()
            });

            progressData.gamesPlayed += 1;
            progressData.xp += score * 10;
            
            // Update streak
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            if (progressData.lastDate === yesterday) {
                progressData.streak += 1;
            } else if (progressData.lastDate !== today.toDateString()) {
                progressData.streak = 1;
            }
            
            if (progressData.streak > progressData.longestStreak) {
                progressData.longestStreak = progressData.streak;
            }
            
            progressData.lastDate = today.toDateString();
            
            if (!progressData.activeDates.includes(today.toDateString())) {
                progressData.activeDates.push(today.toDateString());
            }

            localStorage.setItem(progressKey, JSON.stringify(progressData));
        }

        initGame();
    </script>
</body>
</html>
