<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GAMING - Login</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="background"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="auth-wrapper">
            <!-- AI Character -->
            <div class="ai-character">
                <div class="character-container">
                    <div class="character-glow"></div>
                    <div class="character-avatar">🤖</div>
                </div>
                <h1 class="ai-name">NEXUS AI</h1>
                <p class="ai-greeting">Welcome Back, Champion</p>
                <p class="ai-subtitle">Login to continue your journey</p>
            </div>

            <!-- Auth Panel -->
            <div class="auth-panel">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2 class="auth-title">Access Portal</h2>
                        <p class="auth-subtitle">Enter your credentials</p>
                    </div>

                    <div class="error-message" id="errorMessage"></div>

                    <form id="loginForm" onsubmit="return handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" id="loginEmail" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-input" id="loginPassword" required>
                        </div>
                        <button type="submit" class="submit-btn">Enter Arena</button>
                    </form>

                    <div class="register-link">
                        Don't have an account? <a href="register.html">Register here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
