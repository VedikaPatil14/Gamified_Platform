<!-- profile html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GAMING - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-pink: #ff006e;
            --cyber-blue: #00f5ff;
            --cyber-purple: #8338ec;
            --darker-bg: #1a1a2e;
            --card-bg: #16213e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--darker-bg);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .top-nav {
            background: var(--card-bg);
            padding: 15px 30px;
            margin-bottom: 30px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            padding: 8px 20px;
            background: transparent;
            border: 2px solid var(--cyber-blue);
            border-radius: 8px;
            color: var(--cyber-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: var(--cyber-blue);
            color: #000;
        }

        .profile-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .profile-sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .profile-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--cyber-purple), var(--cyber-pink));
            border: 3px solid var(--cyber-blue);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
        }

        .profile-username {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .profile-id {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .menu-list {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }

        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: rgba(0, 245, 255, 0.05);
        }

        .menu-item.active {
            background: rgba(0, 245, 255, 0.1);
            border-left-color: var(--cyber-blue);
        }

        .profile-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 40px;
        }

        .content-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 150px 1fr 100px;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-label {
            color: rgba(255, 255, 255, 0.5);
        }

        .info-value {
            color: #fff;
        }

        .edit-btn {
            padding: 6px 15px;
            background: transparent;
            border: 1px solid var(--cyber-blue);
            border-radius: 6px;
            color: var(--cyber-blue);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .edit-btn:hover {
            background: rgba(0, 245, 255, 0.1);
        }

        .edit-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .edit-modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--cyber-blue);
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--cyber-blue);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .save-btn {
            flex: 1;
            padding: 12px;
            background: var(--cyber-blue);
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
        }

        .cancel-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }

        @media (max-width: 968px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }

            .info-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="main.html" class="back-btn">← Back to Main</a>
            <div></div>
        </div>

        <div class="profile-layout">
            <div class="profile-sidebar">
                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar">🎮</div>
                    <div class="profile-username" id="profileUsername">Player</div>
                    <div class="profile-id">ID: <span id="profileId">12345</span></div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="followingCount">0</div>
                            <div class="stat-label">Following</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="followersCount">0</div>
                            <div class="stat-label">Followers</div>
                        </div>
                    </div>
                </div>

                <div class="menu-list">
                    <div class="menu-item active" onclick="showSection('basic')">
                        📝 Basic Info
                    </div>
                    <div class="menu-item" onclick="showSection('account')">
                        ⚙️ Account
                    </div>
                    <div class="menu-item" onclick="showSection('privacy')">
                        🔒 Privacy
                    </div>
                </div>
            </div>

            <div class="profile-content">
                <h2 class="content-title">Basic Info</h2>
                <div class="info-grid">
                    <div class="info-row">
                        <div class="info-label">Name</div>
                        <div class="info-value" id="displayName">Player</div>
                        <button class="edit-btn" onclick="openEditModal('name')">Edit</button>
                    </div>
                    <div class="info-row">
                        <div class="info-label">User Type</div>
                        <div class="info-value" id="displayUserType">Student</div>
                        <div></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Age</div>
                        <div class="info-value" id="displayAge">Not specified</div>
                        <button class="edit-btn" onclick="openEditModal('age')">Edit</button>
                    </div>
                    <div class="info-row">
                        <div class="info-label">School</div>
                        <div class="info-value" id="displaySchool">Not specified</div>
                        <button class="edit-btn" onclick="openEditModal('school')">Edit</button>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Email</div>
                        <div class="info-value" id="displayEmail">user@example.com</div>
                        <div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="edit-modal" id="editModal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">Edit Field</h3>
            <div class="form-group">
                <label class="form-label" id="modalLabel">Enter value</label>
                <input type="text" class="form-input" id="modalInput">
            </div>
            <div class="modal-actions">
                <button class="save-btn" onclick="saveEdit()">Save</button>
                <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        let currentField = '';

        function loadProfile() {
            document.getElementById('profileAvatar').textContent = currentUser.avatar || '🎮';
            document.getElementById('profileUsername').textContent = currentUser.username || 'Player';
            document.getElementById('profileId').textContent = currentUser.email?.split('@')[0] || '12345';
            document.getElementById('displayName').textContent = currentUser.username || 'Player';
            document.getElementById('displayUserType').textContent = currentUser.userType || 'Student';
            document.getElementById('displayAge').textContent = currentUser.age || 'Not specified';
            document.getElementById('displaySchool').textContent = currentUser.school || 'Not specified';
            document.getElementById('displayEmail').textContent = currentUser.email || 'user@example.com';
        }

        function showSection(section) {
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function openEditModal(field) {
            currentField = field;
            const modal = document.getElementById('editModal');
            const title = document.getElementById('modalTitle');
            const label = document.getElementById('modalLabel');
            const input = document.getElementById('modalInput');

            const fieldNames = {
                name: 'Name',
                age: 'Age',
                school: 'School'
            };

            title.textContent = `Edit ${fieldNames[field]}`;
            label.textContent = `Enter your ${fieldNames[field].toLowerCase()}`;
            input.value = currentUser[field] || '';
            
            modal.classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function saveEdit() {
            const value = document.getElementById('modalInput').value.trim();
            
            if (!value) {
                alert('Please enter a value');
                return;
            }

            if (currentField === 'name') {
                currentUser.username = value;
            } else {
                currentUser[currentField] = value;
            }

            let users = JSON.parse(localStorage.getItem('gamingUsers')) || [];
            users = users.map(user =>
                user.email === currentUser.email ? currentUser : user
            );

            localStorage.setItem('gamingUsers', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            loadProfile();
            closeEditModal();
        }

        loadProfile();
    </script>
</body>
</html>
