<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GAMING - Profile</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="background"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <div class="top-nav">
            <a href="main.html" class="back-btn">← Back to Main</a>
            <div></div>
        </div>

        <div class="profile-layout">
            <!-- Sidebar -->
            <div class="profile-sidebar">
                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar">🎮</div>
                    <div class="profile-username" id="profileUsername">Player</div>
                    <div class="profile-id">ID: <span id="profileId">—</span></div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="statLevel">1</div>
                            <div class="stat-label">Level</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="statGames">0</div>
                            <div class="stat-label">Games</div>
                        </div>
                    </div>
                </div>

                <div class="menu-list">
                    <div class="menu-item active" onclick="showSection('basic', this)">📝 Basic Info</div>
                    <div class="menu-item"        onclick="showSection('account', this)">⚙️ Account</div>
                    <div class="menu-item"        onclick="showSection('privacy', this)">🔒 Privacy</div>
                </div>
            </div>

            <!-- Content -->
            <div class="profile-content">
                <h2 class="content-title">Basic Info</h2>
                <div class="info-grid">

                    <div class="info-row">
                        <div class="info-label">Name</div>
                        <div class="info-value" id="displayName">—</div>
                        <button class="edit-btn" onclick="openEditModal('name')">Edit</button>
                    </div>

                    <div class="info-row">
                        <div class="info-label">Role</div>
                        <div class="info-value" id="displayUserType">—</div>
                        <div></div>
                    </div>

                    <div class="info-row" id="rowAge" style="display:none;">
                        <div class="info-label">Age</div>
                        <div class="info-value" id="displayAge">Not set</div>
                        <button class="edit-btn" onclick="openEditModal('age')">Edit</button>
                    </div>

                    <div class="info-row" id="rowStandard" style="display:none;">
                        <div class="info-label">Class / Standard</div>
                        <div class="info-value" id="displayStandard">Not set</div>
                        <button class="edit-btn" onclick="openEditModal('standard')">Edit</button>
                    </div>

                    <div class="info-row" id="rowSchool" style="display:none;">
                        <div class="info-label" id="schoolRowLabel">School</div>
                        <div class="info-value" id="displaySchool">Not set</div>
                        <button class="edit-btn" onclick="openEditModal('school')">Edit</button>
                    </div>

                    <div class="info-row">
                        <div class="info-label">Email</div>
                        <div class="info-value" id="displayEmail">—</div>
                        <div></div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="edit-modal" id="editModal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">Edit Field</h3>
            <div class="form-group">
                <label class="form-label" id="modalLabel">Value</label>
                <input type="text" class="form-input" id="modalInput">
            </div>
            <div class="modal-actions">
                <button class="save-btn"   onclick="saveEdit()">Save</button>
                <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="profile.js"></script>
</body>
</html>
