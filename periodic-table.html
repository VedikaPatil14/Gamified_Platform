<!-- Periodic table html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodic Table Game - NEXUS GAMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-pink: #ff006e;
            --cyber-blue: #00f5ff;
            --cyber-purple: #8338ec;
            --cyber-green: #06ffa5;
            --cyber-yellow: #ffbe0b;
            --dark-bg: #050714;
            --card-bg: #16213e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #0a0e27, #050714);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .game-header {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(0, 245, 255, 0.3);
        }

        .back-btn {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid var(--cyber-blue);
            border-radius: 8px;
            color: var(--cyber-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--cyber-blue);
            color: #000;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--cyber-blue);
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            color: var(--cyber-green);
            font-weight: bold;
        }

        .game-card {
            background: var(--card-bg);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
        }

        .question-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .question {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
        }

        .element-display {
            display: inline-block;
            padding: 30px 40px;
            background: linear-gradient(135deg, var(--cyber-purple), var(--cyber-pink));
            border: 3px solid var(--cyber-blue);
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
        }

        .element-symbol {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: bold;
            color: white;
        }

        .element-number {
            font-size: 1.2rem;
            color: var(--cyber-yellow);
            margin-top: 10px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 20px;
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
        }

        .option-btn:hover {
            background: rgba(0, 245, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4);
        }

        .option-btn.correct {
            background: rgba(6, 255, 165, 0.2);
            border-color: var(--cyber-green);
            animation: pulse-green 0.5s ease;
        }

        .option-btn.wrong {
            background: rgba(255, 0, 110, 0.2);
            border-color: var(--cyber-pink);
            animation: shake 0.5s ease;
        }

        @keyframes pulse-green {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-purple));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--cyber-blue);
        }

        .result-screen {
            display: none;
            text-align: center;
        }

        .result-screen.active {
            display: block;
        }

        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-score {
            font-size: 4rem;
            font-weight: bold;
            color: var(--cyber-green);
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .action-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--cyber-blue), var(--cyber-purple));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.5);
        }

        .action-btn.secondary {
            background: transparent;
            border: 2px solid var(--cyber-blue);
        }

        @media (max-width: 768px) {
            .game-header {
                flex-direction: column;
                gap: 15px;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .element-symbol {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <a href="subject.html?subject=Chemistry" class="back-btn">← Back</a>
            <h1 class="game-title">⚗️ Periodic Table</h1>
            <div class="stats">
                <div class="stat">
                    <span>Score:</span>
                    <span class="stat-value" id="scoreDisplay">0</span>
                </div>
                <div class="stat">
                    <span>Question:</span>
                    <span class="stat-value" id="questionNum">1/10</span>
                </div>
            </div>
        </div>

        <div class="game-card">
            <div id="gameScreen">
                <div class="question-area">
                    <div class="question" id="question">What element is this?</div>
                    <div class="element-display">
                        <div class="element-symbol" id="elementSymbol">H</div>
                        <div class="element-number" id="elementNumber">1</div>
                    </div>
                </div>
                <div class="options-grid" id="optionsGrid"></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 10%"></div>
                </div>
            </div>

            <div class="result-screen" id="resultScreen">
                <div class="result-title">🏆 Quiz Complete!</div>
                <div class="result-score" id="finalScore">8/10</div>
                <div class="action-buttons">
                    <button class="action-btn" onclick="restartGame()">Play Again</button>
                    <button class="action-btn secondary" onclick="window.location.href='subject.html?subject=Chemistry'">Back to Games</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const elements = [
            { symbol: 'H', name: 'Hydrogen', number: 1 },
            { symbol: 'He', name: 'Helium', number: 2 },
            { symbol: 'Li', name: 'Lithium', number: 3 },
            { symbol: 'C', name: 'Carbon', number: 6 },
            { symbol: 'N', name: 'Nitrogen', number: 7 },
            { symbol: 'O', name: 'Oxygen', number: 8 },
            { symbol: 'F', name: 'Fluorine', number: 9 },
            { symbol: 'Ne', name: 'Neon', number: 10 },
            { symbol: 'Na', name: 'Sodium', number: 11 },
            { symbol: 'Mg', name: 'Magnesium', number: 12 },
            { symbol: 'Al', name: 'Aluminum', number: 13 },
            { symbol: 'Si', name: 'Silicon', number: 14 },
            { symbol: 'P', name: 'Phosphorus', number: 15 },
            { symbol: 'S', name: 'Sulfur', number: 16 },
            { symbol: 'Cl', name: 'Chlorine', number: 17 },
            { symbol: 'K', name: 'Potassium', number: 19 },
            { symbol: 'Ca', name: 'Calcium', number: 20 },
            { symbol: 'Fe', name: 'Iron', number: 26 },
            { symbol: 'Cu', name: 'Copper', number: 29 },
            { symbol: 'Zn', name: 'Zinc', number: 30 },
            { symbol: 'Ag', name: 'Silver', number: 47 },
            { symbol: 'Au', name: 'Gold', number: 79 },
        ];

        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = 10;
        let usedElements = [];
        let currentElement = null;

        function getRandomElements(correct, count) {
            const options = [correct];
            const available = elements.filter(e => e.name !== correct.name && !usedElements.includes(e.name));
            
            while(options.length < count && available.length > 0) {
                const random = available[Math.floor(Math.random() * available.length)];
                options.push(random);
                available.splice(available.indexOf(random), 1);
            }

            return options.sort(() => Math.random() - 0.5);
        }

        function loadQuestion() {
            if(currentQuestion >= totalQuestions) {
                showResults();
                return;
            }

            const available = elements.filter(e => !usedElements.includes(e.name));
            currentElement = available[Math.floor(Math.random() * available.length)];
            usedElements.push(currentElement.name);

            document.getElementById('elementSymbol').textContent = currentElement.symbol;
            document.getElementById('elementNumber').textContent = currentElement.number;
            document.getElementById('questionNum').textContent = `${currentQuestion + 1}/${totalQuestions}`;
            document.getElementById('scoreDisplay').textContent = score;

            const progress = ((currentQuestion + 1) / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            const options = getRandomElements(currentElement, 4);
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';

            options.forEach(element => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = element.name;
                btn.onclick = () => checkAnswer(element, btn);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if(selected.name === currentElement.name) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                buttons.forEach(b => {
                    if(b.textContent === currentElement.name) {
                        b.classList.add('correct');
                    }
                });
            }

            setTimeout(() => {
                currentQuestion++;
                loadQuestion();
            }, 1500);
        }

        function showResults() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').classList.add('active');
            document.getElementById('finalScore').textContent = `${score}/${totalQuestions}`;

            saveToHistory('Periodic Table Game', 'Medium', score, totalQuestions);
        }

        function restartGame() {
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('resultScreen').classList.remove('active');
            currentQuestion = 0;
            score = 0;
            usedElements = [];
            loadQuestion();
        }

        function saveToHistory(gameName, difficulty, score, total) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) return;

            const progressKey = `progress_${currentUser.email}`;
            let progressData = JSON.parse(localStorage.getItem(progressKey)) || {
                gamesPlayed: 0,
                streak: 0,
                longestStreak: 0,
                lastDate: null,
                activeDates: [],
                xp: 0,
                subjects: { Maths: 0, Physics: 0, Chemistry: 0 },
                history: []
            };

            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            progressData.history.push({
                problem: `${gameName} (${score}/${total})`,
                subject: 'Chemistry',
                difficulty: difficulty,
                date: dateStr,
                timestamp: today.getTime()
            });

            progressData.gamesPlayed += 1;
            progressData.xp += score * 10;
            
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            if (progressData.lastDate === yesterday) {
                progressData.streak += 1;
            } else if (progressData.lastDate !== today.toDateString()) {
                progressData.streak = 1;
            }
            
            if (progressData.streak > progressData.longestStreak) {
                progressData.longestStreak = progressData.streak;
            }
            
            progressData.lastDate = today.toDateString();
            
            if (!progressData.activeDates.includes(today.toDateString())) {
                progressData.activeDates.push(today.toDateString());
            }

            localStorage.setItem(progressKey, JSON.stringify(progressData));
        }

        loadQuestion();
    </script>
</body>
</html>
