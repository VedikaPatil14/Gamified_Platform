<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GAMING - Main</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="background"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="main-wrapper">
        <nav class="top-nav">
            <div class="logo" onclick="window.location.reload()">NEXUS GAMING</div>
            <div class="user-profile-nav">
                <div class="user-hud-left">
                    <button class="progress-btn" onclick="openProgress()">📊 PROGRESS</button>
                    <div class="user-avatar-small" id="userAvatar" onclick="toggleProfileDropdown(event)"></div>

                    <!-- Profile Dropdown -->
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="dropdown-header">
                            <div class="dropdown-avatar" id="dropdownAvatar">🎮</div>
                            <div class="dropdown-user-info">
                                <div class="dropdown-username" id="dropdownUsername">Player</div>
                                <div class="dropdown-level"    id="dropdownLevel">Level: 1</div>
                                <div class="dropdown-xp"       id="dropdownXP">0 XP</div>
                            </div>
                        </div>
                        <div class="dropdown-menu">
                            <div class="dropdown-item" onclick="navigateTo('profile.html')">
                                <span class="dropdown-item-icon">👤</span><span>Profile</span>
                            </div>
                            <div class="dropdown-item" onclick="navigateTo('progress.html')">
                                <span class="dropdown-item-icon">📊</span><span>Progress</span>
                            </div>
                            <div class="dropdown-item logout" onclick="handleLogout()">
                                <span class="dropdown-item-icon">🚪</span><span>Logout</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="user-info-nav">
                    <div class="user-name-small" id="userName"></div>
                    <p id="userLevel" class="user-meta"></p>
                </div>

                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </nav>

        <div class="main-content">
            <div class="dashboard-header">
                <h1 class="welcome-text" id="welcomeMessage">Welcome to the Arena</h1>
                <p class="welcome-subtitle">Choose your subject and dominate the challenges</p>
            </div>

            <div class="stats-overview" id="statsOverview"></div>

            <h2 class="section-title">Subjects</h2>
            <div id="gamesContainer"></div>
        </div>

        <footer class="mini-footer">
            <span>© 2026 Nexus Gaming</span>
            <span class="footer-dot">•</span>
            <span>Play • Learn • Dominate</span>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
