<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GAMING - Main</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-pink: #ff006e;
            --cyber-blue: #00f5ff;
            --cyber-purple: #8338ec;
            --cyber-yellow: #ffbe0b;
            --cyber-green: #06ffa5;
            --dark-bg: #0a0e27;
            --darker-bg: #050714;
            --glow-color: rgba(0, 245, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--darker-bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 0, 110, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(131, 56, 236, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 245, 255, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #050714 0%, #0a0e27 100%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--cyber-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyber-blue);
            animation: particleFloat 15s infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100px) translateX(100px);
                opacity: 0;
            }
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 20px;
        }

        .top-nav {
            background: rgba(10, 14, 39, 0.9);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .user-profile-nav {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 10px 16px;
            background: rgba(0, 245, 255, 0.06);
            border: 1px solid rgba(0, 245, 255, 0.35);
            border-radius: 18px;
            box-shadow: 0 0 30px rgba(0,245,255,0.25);
            position: relative;
        }

        .user-hud-left {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-right: 16px;
            border-right: 1px solid rgba(0,245,255,0.25);
        }

        .user-avatar-small {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--cyber-purple), var(--cyber-pink));
            border: 2px solid var(--cyber-blue);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-avatar-small:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.6);
        }

        .profile-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 15px;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid rgba(0, 245, 255, 0.4);
            border-radius: 12px;
            min-width: 250px;
            display: none;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .profile-dropdown.active {
            display: flex;
            animation: dropdownSlide 0.3s ease;
        }

        @keyframes dropdownSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-header {
            padding: 20px;
            background: rgba(0, 245, 255, 0.08);
            border-bottom: 1px solid rgba(0, 245, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .dropdown-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--cyber-purple), var(--cyber-pink));
            border: 2px solid var(--cyber-blue);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }

        .dropdown-user-info {
            flex: 1;
        }

        .dropdown-username {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--cyber-blue);
            font-size: 1.1rem;
            margin-bottom: 3px;
        }

        .dropdown-level {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .dropdown-xp {
            font-size: 0.75rem;
            color: var(--cyber-yellow);
            margin-top: 2px;
        }

        .dropdown-menu {
            padding: 8px 0;
        }

        .dropdown-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            border-left: 3px solid transparent;
        }

        .dropdown-item:hover {
            background: rgba(0, 245, 255, 0.1);
            border-left-color: var(--cyber-blue);
            color: #fff;
        }

        .dropdown-item-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        .dropdown-item.logout {
            color: var(--cyber-pink);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 5px;
        }

        .dropdown-item.logout:hover {
            background: rgba(255, 0, 110, 0.1);
            border-left-color: var(--cyber-pink);
        }

        .user-info-nav {
            display: flex;
            flex-direction: column;
        }

        .user-name-small {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            color: var(--cyber-blue);
            font-size: 1.1rem;
        }

        .user-meta {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.2;
        }

        .progress-btn {
            padding: 10px 18px;
            background: linear-gradient(135deg, #00f5ff, #8338ec);
            border: none;
            border-radius: 10px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
            transition: 0.3s;
        }

        .progress-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.8);
        }

        .progress-btn span {
            letter-spacing: 1px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255, 0, 110, 0.2);
            border: 2px solid var(--cyber-pink);
            border-radius: 8px;
            color: var(--cyber-pink);
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: var(--cyber-pink);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .welcome-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-pink), var(--cyber-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .welcome-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(10, 14, 39, 0.7);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
            border-color: var(--cyber-blue);
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--cyber-yellow);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--cyber-blue);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            padding-bottom: 10px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-pink));
            box-shadow: 0 0 10px var(--cyber-blue);
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .subject-card {
            background: rgba(10, 14, 39, 0.85);
            border: 2px solid rgba(0, 245, 255, 0.35);
            border-radius: 18px;
            height: 260px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.25);
        }

        .subject-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.25),
                transparent
            );
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .subject-card:hover::before {
            transform: translateX(100%);
        }

        .subject-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 45px rgba(0, 245, 255, 0.6);
        }

        .subject-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.35;
        }

        .subject-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(5, 7, 20, 0.95),
                rgba(5, 7, 20, 0.3)
            );
        }

        .subject-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .subject-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0, 245, 255, 0.5));
        }

        .subject-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cyber-blue);
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
        }

        .subject-progress {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--cyber-yellow);
        }

        .mini-footer {
            margin-top: 60px;
            padding: 18px 10px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            color: rgba(0, 245, 255, 0.7);
            border-top: 1px solid rgba(0, 245, 255, 0.25);
            background: linear-gradient(
                to right,
                rgba(0,0,0,0),
                rgba(0,245,255,0.05),
                rgba(0,0,0,0)
            );
            position: relative;
            z-index: 20;
        }

        .footer-dot {
            margin: 0 10px;
            color: #ff2f92;
        }

        .mini-footer:hover {
            color: #00f5ff;
            text-shadow: 0 0 8px rgba(0,245,255,0.6);
        }

        @media (max-width: 968px) {
            .top-nav {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }

            .user-profile-nav {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }

            .user-hud-left {
                border-right: none;
                border-bottom: 1px solid rgba(0,245,255,0.25);
                padding-bottom: 10px;
                padding-right: 0;
                width: 100%;
                justify-content: center;
            }

            .profile-dropdown {
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }

            .profile-dropdown.active {
                transform: translateX(-50%) translateY(0);
            }

            .subject-grid {
                grid-template-columns: 1fr;
            }

            .stats-overview {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .logo {
                font-size: 1.5rem;
            }

            .welcome-text {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="main-wrapper">
        <nav class="top-nav">
            <div class="logo" onclick="window.location.reload()">NEXUS GAMING</div>
            <div class="user-profile-nav">
                <div class="user-hud-left">
                    <button class="progress-btn" onclick="openProgress()">📊 <span>PROGRESS</span></button>
                    <div class="user-avatar-small" id="userAvatar" onclick="toggleProfileDropdown(event)"></div>
                    
                    <!-- Profile Dropdown Menu -->
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="dropdown-header">
                            <div class="dropdown-avatar" id="dropdownAvatar">🎮</div>
                            <div class="dropdown-user-info">
                                <div class="dropdown-username" id="dropdownUsername">Player</div>
                                <div class="dropdown-level" id="dropdownLevel">Level: 1</div>
                                <div class="dropdown-xp" id="dropdownXP">0 XP</div>
                            </div>
                        </div>
                        <div class="dropdown-item" onclick="navigateTo('profile.html')">
    <span class="dropdown-item-icon">👤</span>
    <span>Profile</span>
</div>

<div class="dropdown-item" onclick="navigateTo('settings.html')">
    <span class="dropdown-item-icon">⚙️</span>
    <span>Settings</span>
</div>

<div class="dropdown-item" onclick="navigateTo('help.html')">
    <span class="dropdown-item-icon">❓</span>
    <span>Help</span>
</div>

                    </div>
                </div>

                <div class="user-info-nav">
                    <div class="user-name-small" id="userName"></div>
                    <p id="userLevel" class="user-meta"></p>
                </div>

                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </nav>

        <div class="main-content">
            <div class="dashboard-header">
                <h1 class="welcome-text" id="welcomeMessage">Welcome to the Arena</h1>
                <p class="welcome-subtitle">Choose your subject and dominate the challenges</p>
            </div>

            <!-- Stats Overview -->
            <div class="stats-overview" id="statsOverview"></div>

            <h2 class="section-title">Subjects</h2>
            <div id="gamesContainer"></div>
        </div>

        <footer class="mini-footer">
            <span>© 2026 Nexus Gaming</span>
            <span class="footer-dot">•</span>
            <span>Play • Learn • Dominate</span>
        </footer>
    </div>

    <script>
        // ============================================
        // SUBJECT CONFIGURATION (Matches subject.html)
        // ============================================
        const subjects = [
            {
                name: "Maths",
                icon: "🧮",
                image: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb"
            },
            {
                name: "Physics",
                icon: "⚛️",
                image: "https://images.unsplash.com/photo-1532187863486-abf9dbad1b69"
            },
            {
                name: "Chemistry",
                icon: "🧪",
                image: "https://images.unsplash.com/photo-1581092919535-7146c0c4d1c1"
            }
        ];

        // ============================================
        // PARTICLE EFFECTS
        // ============================================
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            if (!particlesContainer) return;
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // ============================================
        // USER DATA MANAGEMENT
        // ============================================
        function initializeUser() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                window.location.href = 'login.html';
                return false;
            }

            // Get user progress data (matching progress.html structure)
            const progressKey = `progress_${currentUser.email}`;
            let progressData = JSON.parse(localStorage.getItem(progressKey)) || {
                gamesPlayed: 0,
                streak: 0,
                longestStreak: 0,
                lastDate: null,
                activeDates: [],
                xp: 0,
                subjects: { Maths: 0, Physics: 0, Chemistry: 0 },
                history: []
            };

            // Calculate level from XP (100 XP per level)
            const level = Math.floor(progressData.xp / 100) + 1;

            // Update all user display elements
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const welcomeMessage = document.getElementById('welcomeMessage');
            const userLevel = document.getElementById('userLevel');
            const dropdownAvatar = document.getElementById('dropdownAvatar');
            const dropdownUsername = document.getElementById('dropdownUsername');
            const dropdownLevel = document.getElementById('dropdownLevel');
            const dropdownXP = document.getElementById('dropdownXP');

            if (userAvatar) userAvatar.textContent = currentUser.avatar || '🎮';
            if (userName) userName.textContent = currentUser.username || 'Player';
            if (welcomeMessage) welcomeMessage.textContent = `Welcome Back, ${currentUser.username || 'Player'}!`;
            if (userLevel) userLevel.textContent = `Level ${level} • ${currentUser.userType || 'Student'}`;
            
            // Populate dropdown
            if (dropdownAvatar) dropdownAvatar.textContent = currentUser.avatar || '🎮';
            if (dropdownUsername) dropdownUsername.textContent = currentUser.username || 'Player';
            if (dropdownLevel) dropdownLevel.textContent = `Level: ${level}`;
            if (dropdownXP) dropdownXP.textContent = `${progressData.xp} XP`;

            // Update stats
            updateStats(progressData, level);

            return true;
        }

        // ============================================
        // STATS DISPLAY
        // ============================================
        function updateStats(progressData, level) {
            const statsOverview = document.getElementById('statsOverview');
            if (!statsOverview) return;

            const stats = [
                { label: "Level", value: level, icon: "⚡" },
                { label: "Total XP", value: progressData.xp, icon: "✨" },
                { label: "Games Played", value: progressData.gamesPlayed, icon: "🎮" },
                { label: "Current Streak", value: progressData.streak, icon: "🔥" }
            ];

            statsOverview.innerHTML = stats.map(stat => `
                <div class="stat-card">
                    <div class="stat-value">${stat.icon} ${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                </div>
            `).join('');
        }

        // ============================================
        // SUBJECTS RENDERING
        // ============================================
        function renderSubjects() {
            const container = document.getElementById("gamesContainer");
            if (!container) return;
            
            container.innerHTML = "";

            const grid = document.createElement("div");
            grid.className = "subject-grid";

            subjects.forEach(subject => {
                const card = document.createElement("div");
                card.className = "subject-card";

                card.innerHTML = `
                    <div class="subject-bg" style="background-image:url('${subject.image}')"></div>
                    <div class="subject-overlay"></div>
                    <div class="subject-content">
                        <div class="subject-icon">${subject.icon}</div>
                        <div class="subject-name">${subject.name}</div>
                    </div>
                `;

                card.onclick = () => {
                    window.location.href = `subject.html?subject=${subject.name}`;
                };

                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        // ============================================
        // NAVIGATION & INTERACTION
        // ============================================
        function toggleProfileDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('active');
        }

        function navigateTo(url) {
            window.location.href = url;
        }

        function openProgress() {
            window.location.href = 'progress.html';
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('profileDropdown');
            const avatar = document.getElementById('userAvatar');
            
            if (dropdown && !dropdown.contains(event.target) && event.target !== avatar) {
                dropdown.classList.remove('active');
            }
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        window.addEventListener('DOMContentLoaded', function() {
            createParticles();
            if (initializeUser()) {
                renderSubjects();
            }
        });
    </script>
</body>
</html>
