<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GAMING - Register</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="background"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="auth-wrapper">

            <!-- AI Character -->
            <div class="ai-character">
                <div class="character-container">
                    <div class="character-glow"></div>
                    <div class="character-avatar">🤖</div>
                </div>
                <h1 class="ai-name">NEXUS AI</h1>
                <p class="ai-greeting">Welcome, Future Champion</p>
                <p class="ai-subtitle">Register to enter the gaming arena</p>
            </div>

            <!-- Auth Panel -->
            <div class="auth-panel">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2 class="auth-title">Create Account</h2>
                        <p class="auth-subtitle">Join the ultimate learning adventure</p>
                    </div>

                    <div class="error-message" id="errorMessage"></div>

                    <form id="registerForm" onsubmit="return handleRegister(event)">

                        <!-- Role Selection -->
                        <div class="form-group">
                            <label class="form-label">I am a…</label>
                            <div class="user-type-grid">
                                <div class="user-type-option" onclick="selectUserType(this, 'student')">
                                    <div class="user-type-icon">🎓</div>
                                    <div class="user-type-label">Student</div>
                                </div>
                                <div class="user-type-option" onclick="selectUserType(this, 'parent')">
                                    <div class="user-type-icon">👨‍👩‍👦</div>
                                    <div class="user-type-label">Parent</div>
                                </div>
                                <div class="user-type-option" onclick="selectUserType(this, 'teacher')">
                                    <div class="user-type-icon">👨‍🏫</div>
                                    <div class="user-type-label">Teacher</div>
                                </div>
                            </div>
                            <input type="hidden" id="selectedUserType">
                        </div>

                        <!-- Basic Info -->
                        <div class="section-divider">Basic Info</div>

                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-input" id="regUsername" placeholder="Choose a cool username" required minlength="3">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-input" id="regEmail" placeholder="your@email.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-input" id="regPassword" placeholder="Min. 6 characters" required minlength="6">
                            </div>
                        </div>

                        <!-- Student-only fields -->
                        <div id="ageGroup" class="form-row" style="display:none;">
                            <div class="form-group">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-input" id="regAge" placeholder="e.g. 8" min="3" max="12">
                            </div>
                            <div id="standardGroup" class="form-group">
                                <label class="form-label">Class / Standard</label>
                                <select class="form-input" id="regStandard">
                                    <option value="">Select class</option>
                                    <option value="LKG">LKG</option>
                                    <option value="UKG">UKG</option>
                                    <option value="1">1st Standard</option>
                                    <option value="2">2nd Standard</option>
                                    <option value="3">3rd Standard</option>
                                    <option value="4">4th Standard</option>
                                </select>
                            </div>
                        </div>

                        <!-- School field (student / teacher) -->
                        <div id="schoolGroup" class="form-group" style="display:none;">
                            <label class="form-label" id="schoolLabel">School Name</label>
                            <input type="text" class="form-input" id="regSchool" placeholder="Enter school name">
                        </div>

                        <!-- Avatar Picker -->
                        <div class="section-divider">Choose Your Avatar</div>
                        <div class="form-group">
                            <div class="avatar-grid">
                                <div class="avatar-option" onclick="selectAvatar(this,'🎮')">🎮</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'⚔️')">⚔️</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'🛡️')">🛡️</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'👾')">👾</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'🎯')">🎯</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'🔥')">🔥</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'⚡')">⚡</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'🌟')">🌟</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'💎')">💎</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'🎲')">🎲</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'🏆')">🏆</div>
                                <div class="avatar-option" onclick="selectAvatar(this,'👑')">👑</div>
                            </div>
                            <input type="hidden" id="selectedAvatar">
                        </div>

                        <button type="submit" class="submit-btn">Create Account</button>
                    </form>

                    <div class="login-link">
                        Already have an account? <a href="login.html">Login here</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
