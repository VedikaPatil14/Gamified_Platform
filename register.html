<!-- register html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GAMING - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-pink: #ff006e;
            --cyber-blue: #00f5ff;
            --cyber-purple: #8338ec;
            --cyber-yellow: #ffbe0b;
            --dark-bg: #0a0e27;
            --darker-bg: #050714;
            --glow-color: rgba(0, 245, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--darker-bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 0, 110, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(131, 56, 236, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 245, 255, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #050714 0%, #0a0e27 100%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--cyber-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyber-blue);
            animation: particleFloat 15s infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-wrapper {
            display: flex;
            max-width: 1200px;
            width: 100%;
            gap: 40px;
            align-items: center;
        }

        .ai-character {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: slideInLeft 1s ease-out;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .character-container {
            position: relative;
            width: 300px;
            height: 400px;
            margin-bottom: 30px;
        }

        .character-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 450px;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        .character-avatar {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--cyber-purple), var(--cyber-pink));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            border: 3px solid var(--cyber-blue);
            box-shadow: 
                0 0 30px rgba(0, 245, 255, 0.4),
                inset 0 0 30px rgba(0, 245, 255, 0.2);
            overflow: hidden;
        }

        .character-avatar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 70%
            );
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .ai-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .ai-greeting {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
        }

        .ai-subtitle {
            font-size: 0.95rem;
            color: rgba(0, 245, 255, 0.7);
            font-style: italic;
        }

        .auth-panel {
            flex: 1;
            max-width: 500px;
            animation: slideInRight 1s ease-out;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .auth-card {
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(0, 245, 255, 0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .google-btn {
            width: 100%;
            padding: 15px;
            background: #fff;
            border: none;
            border-radius: 10px;
            color: #000;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .divider span {
            padding: 0 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--cyber-blue);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 245, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--cyber-blue);
            background: rgba(0, 245, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
        }

        select.form-input {
            cursor: pointer;
        }

        .user-type-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .user-type-option {
            padding: 20px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 245, 255, 0.2);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-type-option:hover {
            border-color: var(--cyber-blue);
            background: rgba(0, 245, 255, 0.1);
        }

        .user-type-option.selected {
            border-color: var(--cyber-yellow);
            background: rgba(255, 190, 11, 0.1);
            box-shadow: 0 0 20px rgba(255, 190, 11, 0.3);
        }

        .user-type-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .user-type-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }

        .avatar-selector {
            margin-bottom: 20px;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .avatar-option {
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--cyber-purple), var(--cyber-pink));
            border: 2px solid rgba(0, 245, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .avatar-option:hover {
            transform: scale(1.1);
            border-color: var(--cyber-blue);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
        }

        .avatar-option.selected {
            border-color: var(--cyber-yellow);
            box-shadow: 0 0 25px rgba(255, 190, 11, 0.6);
            transform: scale(1.05);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--cyber-blue), var(--cyber-purple));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 30px rgba(0, 245, 255, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid var(--cyber-pink);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            color: var(--cyber-pink);
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .login-link a {
            color: var(--cyber-blue);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: var(--cyber-pink);
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
        }

        @media (max-width: 968px) {
            .auth-wrapper {
                flex-direction: column;
            }

            .ai-character {
                margin-bottom: 20px;
            }

            .character-container {
                width: 200px;
                height: 280px;
            }

            .character-avatar {
                font-size: 80px;
            }

            .ai-name {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 25px;
            }

            .avatar-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .user-type-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="auth-wrapper">
            <div class="ai-character">
                <div class="character-container">
                    <div class="character-glow"></div>
                    <div class="character-avatar">🤖</div>
                </div>
                <h1 class="ai-name">NEXUS AI</h1>
                <p class="ai-greeting">Welcome, Future Champion</p>
                <p class="ai-subtitle">Register to enter the gaming arena</p>
            </div>

            <div class="auth-panel">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2 class="auth-title">Create Account</h2>
                        <p class="auth-subtitle">Join the ultimate gaming experience</p>
                    </div>

                    <div class="error-message" id="errorMessage"></div>

                    <button class="google-btn" onclick="handleGoogleRegister()">
                        <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Continue with Google
                    </button>

                    <div class="divider"><span>OR</span></div>

                    <form id="registerForm" onsubmit="return handleRegister(event)">
                        <div class="form-group">
                            <label class="form-label">I am a...</label>
                            <div class="user-type-grid">
                                <div class="user-type-option" onclick="selectUserType(this, 'student')">
                                    <div class="user-type-icon">🎓</div>
                                    <div class="user-type-label">Student</div>
                                </div>
                                <div class="user-type-option" onclick="selectUserType(this, 'teacher')">
                                    <div class="user-type-icon">👨‍🏫</div>
                                    <div class="user-type-label">Teacher</div>
                                </div>
                                <div class="user-type-option" onclick="selectUserType(this, 'admin')">
                                    <div class="user-type-icon">🏫</div>
                                    <div class="user-type-label">School Admin</div>
                                </div>
                            </div>
                            <input type="hidden" id="selectedUserType" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-input" id="regUsername" required minlength="3">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" id="regEmail" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-input" id="regPassword" required minlength="6">
                        </div>

                        <div class="form-group" id="ageGroup" style="display: none;">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-input" id="regAge" min="5" max="100">
                        </div>

                        <div class="form-group" id="schoolGroup" style="display: none;">
                            <label class="form-label">School Name</label>
                            <input type="text" class="form-input" id="regSchool">
                        </div>

                        <div class="form-group avatar-selector">
                            <label class="form-label">Choose Your Avatar</label>
                            <div class="avatar-grid">
                                <div class="avatar-option" onclick="selectAvatar(this, '🎮')">🎮</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '🛡️')">🛡️</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '👾')">👾</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '🎯')">🎯</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '⚡')">⚡</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '🌟')">🌟</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '💎')">💎</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '🎲')">🎲</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '🏆')">🏆</div>
                                <div class="avatar-option" onclick="selectAvatar(this, '👑')">👑</div>
                            </div>
                            <input type="hidden" id="selectedAvatar">
                        </div>

                        <button type="submit" class="submit-btn">Create Account</button>
                    </form>

                    <div class="login-link">
                        Already have an account? <a href="login.html">Login here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        let users = JSON.parse(localStorage.getItem('gamingUsers')) || [];

        // Check if coming from Google OAuth
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('google') === 'true') {
            const tempUser = JSON.parse(localStorage.getItem('tempGoogleUser'));
            if (tempUser) {
                document.getElementById('regUsername').value = tempUser.username;
                document.getElementById('regEmail').value = tempUser.email;
                document.getElementById('regEmail').readOnly = true;
                document.getElementById('regPassword').closest('.form-group').style.display = 'none';
            }
        }

        function selectUserType(element, type) {
            document.querySelectorAll('.user-type-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
            document.getElementById('selectedUserType').value = type;

            const ageGroup = document.getElementById('ageGroup');
            const schoolGroup = document.getElementById('schoolGroup');

            if (type === 'student') {
                ageGroup.style.display = 'block';
                schoolGroup.style.display = 'none';
                document.getElementById('regAge').required = true;
                document.getElementById('regSchool').required = false;
            } else if (type === 'teacher' || type === 'admin') {
                ageGroup.style.display = 'none';
                schoolGroup.style.display = 'block';
                document.getElementById('regAge').required = false;
                document.getElementById('regSchool').required = true;
            }
        }

        function selectAvatar(element, avatar) {
            document.querySelectorAll('.avatar-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
            document.getElementById('selectedAvatar').value = avatar;
        }

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.classList.add('show');
            setTimeout(() => {
                errorElement.classList.remove('show');
            }, 3000);
        }

        function handleGoogleRegister() {
            const googleUser = {
                username: 'Google User',
                email: 'user' + Date.now() + '@gmail.com',
                avatar: '🎮',
                authProvider: 'google'
            };

            localStorage.setItem('tempGoogleUser', JSON.stringify(googleUser));
            window.location.href = 'register.html?google=true';
        }

        function handleRegister(event) {
            event.preventDefault();
            
            const userType = document.getElementById('selectedUserType').value;
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const avatar = document.getElementById('selectedAvatar').value;
            const age = document.getElementById('regAge').value;
            const school = document.getElementById('regSchool').value.trim();

            if (!userType) {
                showError('Please select your user type!');
                return false;
            }

            if (!avatar) {
                showError('Please select an avatar!');
                return false;
            }

            if (users.some(user => user.username === username)) {
                showError('Username already exists!');
                return false;
            }

            if (users.some(user => user.email === email)) {
                showError('Email already registered!');
                return false;
            }

            const newUser = {
                username,
                email,
                password: password || 'google-oauth',
                avatar,
                userType,
                authProvider: urlParams.get('google') === 'true' ? 'google' : 'email'
            };

            if (userType === 'student' && age) {
                newUser.age = parseInt(age);
            }

            if ((userType === 'teacher' || userType === 'admin') && school) {
                newUser.school = school;
            }

            users.push(newUser);
            localStorage.setItem('gamingUsers', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            localStorage.removeItem('tempGoogleUser');
            
            window.location.href = 'main.html';
            
            return false;
        }
    </script>
</body>
</html>
